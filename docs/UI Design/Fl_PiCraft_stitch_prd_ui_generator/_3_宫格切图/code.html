<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fl PiCraft - 宫格切图编辑</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#ede6f1",
                        "on-tertiary-container": "#ffcbda",
                        "tertiary-fixed": "#ffd9e3",

                        "on-secondary-fixed-variant": "#4a4358",
                        "primary-fixed-dim": "#cfbcff",
                        "secondary-fixed": "#e8def9",

                        "surface-bright": "#fef7ff",
                        "surface-tint": "#6750a4",
                        "on-secondary": "#ffffff",
                        "tertiary": "#633b48",
                        "surface-dim": "#dfd7e3",
                        "surface-container-highest": "#e7e0eb",
                        "primary-container": "#6750a4",
                        "outline-variant": "#cbc4d2",
                        "on-surface": "#1d1a22",
                        "surface": "#fef7ff",
                        "on-primary-fixed-variant": "#4f378a",
                        "surface-variant": "#e7e0eb",
                        "secondary-fixed-dim": "#ccc2dc",

                        "surface-container-low": "#f9f1fd",
                        "primary-fixed": "#e9ddff",
                        "on-surface-variant": "#494551",
                        "background": "#fef7ff",
                        "tertiary-fixed-dim": "#eeb8c8",
                        "secondary": "#625b71",
                        "on-secondary-container": "#686177",
                        "error": "#ba1a1a",
                        "inverse-surface": "#322f37",
                        "secondary-container": "#e8def9",
                        "on-tertiary-fixed": "#31111d",
                        "primary": "#4f378a",
                        "on-tertiary": "#ffffff",
                        "outline": "#7a7582",
                        "on-primary-fixed": "#22005d",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-background": "#1d1a22",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f3ebf7",
                        "on-primary-container": "#e0d2ff",
                        "inverse-on-surface": "#f6eefa"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .grid-overlay {
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.4) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.4) 1px, transparent 1px);
            background-size: 33.33% 33.33%;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-fixed-dim">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 py-2 bg-surface dark:bg-surface-dim shadow-sm">
<div class="flex items-center gap-3">
<button class="p-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-headline-sm text-primary dark:text-primary-fixed-dim">宫格切图编辑</h1>
</div>
<button class="px-4 py-2 bg-primary text-on-primary rounded-full font-label text-label-sm font-medium hover:bg-opacity-90 active:scale-95 transition-all">导出</button>
</header>
<main class="pt-16 pb-32 min-h-screen px-4 max-w-4xl mx-auto flex flex-col gap-6">
<!-- Large Preview Canvas -->
<section class="relative aspect-square w-full bg-surface-container rounded-xl overflow-hidden shadow-lg border border-outline-variant">
<!-- Main Image Placeholder -->
<div class="absolute inset-0 flex items-center justify-center">
<img alt="Preview Image" class="w-full h-full object-cover" data-alt="A cinematic, high-resolution architectural photograph showing a minimalist concrete structure with sharp shadows and soft morning light. The composition is balanced and modern, utilizing a cool color palette of grays and soft blues. The mood is peaceful and professional, fitting for a high-end design application. Fine textures of the concrete are visible under the gentle sunlight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmfyOg8NIrUbv9Sww0vv_05-PZKm5PZjQXP40mbs0IQLm1NlsrgpoOwrboDijVfdHIu5HAKN-M-mJ38Lm5BovemA649hPYGG9_YgvjIi42SxsF_QpreXKPcj0_6mUvGe5vz2_Y6p_aV3YxJKBh3psFdfuN3FoUIFYCT8JGrGaCcYSXPr8ZZLlWGTwJdL5g5alHU0wNakO3Pf1LhXkkLKxqCRKBLd7VUSmxsIpj670xxRVwolpMWyWKTcpA1s-C44qMcan93krNouo"/>
</div>
<!-- Grid Overlay (3x3 default) -->
<div class="absolute inset-0 grid grid-cols-3 grid-rows-3 pointer-events-none">
<div class="border-r border-b border-white/40"></div>
<div class="border-r border-b border-white/40"></div>
<div class="border-b border-white/40"></div>
<div class="border-r border-b border-white/40"></div>
<!-- Center Cell Placeholder (Active for Nine-Grid Social Mode) -->
<div class="border-r border-b border-white/40 bg-black/20 backdrop-blur-sm flex flex-col items-center justify-center pointer-events-auto cursor-pointer hover:bg-black/30 transition-all">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="text-white text-xs mt-2 font-medium">替换图片</span>
</div>
<div class="border-b border-white/40"></div>
<div class="border-r border-white/40"></div>
<div class="border-r border-white/40"></div>
<div></div>
</div>
</section>
<!-- Mode Toggle & Controls -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant">
<div class="flex flex-col">
<span class="font-bold text-on-surface">九宫格朋友圈模式</span>
<span class="text-xs text-on-surface-variant">开启3x3布局并支持中心图片替换</span>
</div>
<!-- Custom Toggle Switch -->
<button class="relative w-12 h-6 bg-primary rounded-full flex items-center px-1 transition-all">
<div class="w-4 h-4 bg-on-primary rounded-full ml-auto"></div>
</button>
</div>
<!-- Grid Type Selector -->
<div class="flex flex-col gap-3">
<h3 class="font-label font-bold text-on-surface-variant uppercase tracking-wider text-xs px-1">宫格类型</h3>
<div class="flex overflow-x-auto gap-3 pb-2 hide-scrollbar"><!-- 1x2 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary">view_agenda</span>
<span class="text-[10px] mt-1 font-bold">1x2</span>
</button>
<!-- 2x1 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary transform rotate-90">view_agenda</span>
<span class="text-[10px] mt-1 font-bold">2x1</span>
</button>
<!-- 1x3 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary">view_day</span>
<span class="text-[10px] mt-1 font-bold">1x3</span>
</button>
<!-- 3x1 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary">view_column</span>
<span class="text-[10px] mt-1 font-bold">3x1</span>
</button>
<!-- 2x2 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary">grid_view</span>
<span class="text-[10px] mt-1 font-bold">2x2</span>
</button>
<!-- 2x3 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary">dashboard</span>
<span class="text-[10px] mt-1 font-bold">2x3</span>
</button>
<!-- 3x2 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary transform rotate-90">dashboard</span>
<span class="text-[10px] mt-1 font-bold">3x2</span>
</button>
<!-- 3x3 (Active) -->
<button class="flex-shrink-0 w-20 h-20 bg-primary-container text-on-primary-container rounded-xl flex flex-col items-center justify-center border-2 border-primary shadow-md transition-all">
<span class="material-symbols-outlined">apps</span>
<span class="text-[10px] mt-1 font-bold">3x3</span>
</button>
<!-- 4x4 -->
<button class="flex-shrink-0 w-20 h-20 bg-surface-container-high rounded-xl flex flex-col items-center justify-center border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined text-secondary">calendar_view_month</span>
<span class="text-[10px] mt-1 font-bold">4x4</span>
</button></div>
</div>
</div>
<!-- Parameters Cards (Asymmetric Bento Style) -->
<div class="grid grid-cols-2 gap-4">
<div class="col-span-1 p-4 bg-tertiary-container text-on-tertiary rounded-xl flex flex-col justify-between h-32">
<span class="material-symbols-outlined text-3xl">straighten</span>
<div>
<p class="text-xs font-medium opacity-80">宫格间距</p>
<p class="text-lg font-bold">0 px</p>
</div>
</div>
<div class="col-span-1 p-4 bg-secondary-container text-on-secondary-container rounded-xl flex flex-col justify-between h-32">
<span class="material-symbols-outlined text-3xl">rounded_corner</span>
<div>
<p class="text-xs font-medium opacity-80">圆角大小</p>
<p class="text-lg font-bold">12 px</p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar / Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-surface dark:bg-surface-dim shadow-lg rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container-highest transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="photo_library">photo_library</span>
<span class="font-label text-label-sm font-medium">作品库</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container-highest transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome_mosaic">auto_awesome_mosaic</span>
<span class="font-label text-label-sm font-medium">长图拼接</span>
</a>
<!-- Active Item: Grid -->
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-xl px-4 py-1 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label text-label-sm font-medium">宫格切图</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container-highest transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label text-label-sm font-medium">设置</span>
</a>
</nav>
<!-- Floating Action Button: Contextual for Preview & Export -->
<div class="fixed bottom-24 right-6 z-40">
<button class="w-16 h-16 bg-primary text-on-primary rounded-full shadow-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl">output</span>
</button>
</div>
</body></html>
